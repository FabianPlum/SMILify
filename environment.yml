# SMILify conda environment.
#
# Reproduce with:
#   conda env create -f environment.yml
#   conda activate pytorch3d
#
# VERIFIED on Linux (Ubuntu 24.04) on 2026-06-30: this is the exact stack the models
# are trained and run with on the Linux box (PyTorch 2.1.1 / pytorch-cuda 11.8 / pytorch3d 0.7.7).
#
# WINDOWS 11 development uses PyTorch 2.3.1 with the same CUDA 11.8. PyTorch3D has no
# prebuilt Windows conda package for every combo, so on Windows follow the manual conda
# steps in the README ("Installation") and bump `pytorch=2.1.1` -> `pytorch=2.3.1`
# (let conda resolve a matching torchvision / pytorch3d).
#
# The dependency split below mirrors the verified env exactly (some packages are pip-only
# upstream). Optional tooling (dataset viewer, AntScan scraper, SDF tests, legacy quadruped
# pose-prior visualization) is listed at the bottom, commented out — install only if needed.

name: pytorch3d

channels:
  - pytorch
  - pytorch3d
  - conda-forge

dependencies:
  # --- core deep-learning stack (CUDA 11.8) ---
  - python=3.10
  - pytorch=2.1.1
  - pytorch-cuda=11.8
  - torchvision=0.16.1
  - pytorch3d=0.7.7        # pulls fvcore / iopath automatically

  # --- scientific / IO stack ---
  - scipy=1.14.0
  - h5py=3.14.0
  - pandas=2.3.3
  - pillow=12.0.0
  - imageio=2.34.2
  - scikit-image=0.24.0
  - trimesh=4.4.3
  - tqdm=4.66.4
  - psutil=6.0.0
  - pyyaml=6.0.1

  - pip
  - pip:
    # installed via pip in the verified env (mirrored here for an exact reproduction)
    - numpy==1.25.2
    - matplotlib==3.9.1
    - timm==1.0.20
    - opencv-python==4.10.0.84
    - nibabel==5.2.1
    - pycocotools==2.0.8
    - toml==0.10.2

# --- optional extras (uncomment what you need) ------------------------------
#   Interactive multi-view dataset viewer (smal_fitter/multiview_common/dataset_viewer.py):
#     - streamlit
#     - plotly
#   AntScan scraper (custom_processing/antscan_scraper.py):
#     - requests
#     - beautifulsoup4
#     - selenium
#     - webdriver-manager        # (pip)
#   SDF registration test harness (fitter_3d/SDF_tests.py):
#     - gputil                   # (pip: GPUtil)
#   Legacy quadruped pose-prior visualization (smal_fitter/priors/pose_prior_35.py):
#     # requires psbody-mesh, which has no conda/pip wheel — build from source if needed.
