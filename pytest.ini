[pytest]
# The maintained suite lives in tests/. Module-local test_*.py files elsewhere in
# the tree (e.g. smal_fitter/sleap_data/, smal_fitter/neuralSMIL/) are dev/integration
# scripts that need external datasets, a GPU, or CLI args and are meant to be run
# explicitly by path (e.g. `python -m pytest smal_fitter/sleap_data/test_...py`),
# not auto-collected into the default run.
testpaths = tests
markers =
    slow: marks tests as slow (deselect with '-m "not slow"')
